<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>轻量级旅程地图规划</title>

    <!-- Leaflet 地图：本地双击打开时，去掉 integrity/crossorigin，避免 CDN 文件校验被浏览器拦截 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- SortableJS：用于行程城市拖拽排序。使用 unpkg，减少部分浏览器对 jsdelivr 的 Tracking Prevention 提示 -->
    <script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      #map {
        width: 100%;
        height: 100vh;
        z-index: 1;
      }

      .floating-root {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
      }

      .fab {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: #ef4444;
        color: white;
        font-size: 30px;
        line-height: 48px;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
        transition:
          transform 0.15s ease,
          background 0.15s ease;
      }

      .fab:hover {
        transform: scale(1.04);
        background: #dc2626;
      }

      .fab-menu {
        display: none;
        min-width: 180px;
        border-radius: 14px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
        box-shadow: 0 14px 35px rgba(15, 23, 42, 0.2);
      }

      .fab-menu.open {
        display: block;
      }

      .menu-item {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
        color: #111827;
      }

      .menu-item:hover {
        background: #f3f4f6;
      }

      .active-trip-bar {
        position: fixed;
        left: 18px;
        top: 18px;
        z-index: 900;
        max-width: min(520px, calc(100vw - 100px));
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 14px;
      }

      .active-trip-bar.show {
        display: flex;
      }

      .active-trip-title {
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .active-trip-meta {
        color: #6b7280;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .drawer-mask {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.22);
        z-index: 1090;
        display: none;
      }

      .drawer-mask.open {
        display: block;
      }

      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: min(760px, 100vw);
        height: 100vh;
        background: #ffffff;
        z-index: 1100;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        box-shadow: -18px 0 40px rgba(15, 23, 42, 0.22);
        display: flex;
        flex-direction: column;
      }

      .drawer.open {
        transform: translateX(0);
      }

      .drawer-header {
        padding: 18px 22px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .drawer-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      .drawer-close {
        border: none;
        background: #f3f4f6;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
      }

      .drawer-body {
        padding: 18px 22px 90px;
        overflow: auto;
        flex: 1;
      }

      .drawer-footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 12px 22px;
        border-top: 1px solid #e5e7eb;
        background: rgba(255, 255, 255, 0.96);
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .section {
        margin-bottom: 22px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 800;
        color: #111827;
      }

      .section-desc {
        margin: -4px 0 12px;
        font-size: 13px;
        color: #6b7280;
        line-height: 1.6;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .form-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-row.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 12px;
        color: #4b5563;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 9px 10px;
        font-size: 14px;
        outline: none;
        background: #ffffff;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 9px 14px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        background: #f3f4f6;
        color: #111827;
      }

      .btn:hover {
        background: #e5e7eb;
      }

      .btn.primary {
        background: #ef4444;
        color: white;
      }

      .btn.primary:hover {
        background: #dc2626;
      }

      .btn.danger {
        background: #fee2e2;
        color: #b91c1c;
      }

      .btn.danger:hover {
        background: #fecaca;
      }

      .btn.small {
        padding: 6px 9px;
        font-size: 12px;
        border-radius: 8px;
      }

      .city-search-wrap {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .city-result-list {
        max-height: 230px;
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f9fafb;
      }

      .city-result {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
      }

      .city-result:last-child {
        border-bottom: none;
      }

      .city-name {
        font-weight: 800;
        color: #111827;
      }

      .city-meta {
        margin-top: 2px;
        color: #6b7280;
        font-size: 12px;
      }

      .stop-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .stop-card,
      .leg-card,
      .trip-card {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 5px 14px rgba(15, 23, 42, 0.05);
      }

      .stop-card {
        padding: 12px;
      }

      .stop-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .drag-handle {
        cursor: grab;
        color: #9ca3af;
        font-weight: 900;
        padding-right: 6px;
        user-select: none;
      }

      .stop-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 900;
      }

      .stop-index {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        background: #ef4444;
        font-size: 13px;
      }

      .stop-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .leg-card {
        padding: 12px;
        margin-bottom: 10px;
      }

      .leg-title {
        font-weight: 900;
        margin-bottom: 10px;
      }

      .trip-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .trip-card {
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .trip-card-title {
        font-weight: 900;
        font-size: 15px;
        margin-bottom: 4px;
      }

      .trip-card-meta {
        color: #6b7280;
        font-size: 13px;
      }

      .trip-card-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .empty-state {
        padding: 20px;
        border-radius: 14px;
        border: 1px dashed #d1d5db;
        background: #f9fafb;
        color: #6b7280;
        line-height: 1.6;
        font-size: 14px;
      }

      .trip-marker {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #ef4444;
        color: white;
        border: 3px solid white;
        box-shadow: 0 7px 20px rgba(239, 68, 68, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 14px;
      }

      .city-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #2563eb;
        border: 2px solid white;
        box-shadow: 0 3px 12px rgba(37, 99, 235, 0.35);
      }

      .popup-card {
        width: 280px;
        max-width: calc(100vw - 70px);
        font-size: 13px;
        line-height: 1.5;
      }

      .popup-title {
        font-size: 16px;
        font-weight: 900;
        margin-bottom: 4px;
      }

      .popup-subtitle {
        color: #6b7280;
        margin-bottom: 8px;
      }

      .popup-block {
        border-top: 1px solid #e5e7eb;
        padding-top: 8px;
        margin-top: 8px;
      }

      .popup-block-title {
        font-weight: 900;
        margin-bottom: 5px;
      }

      .weather-row {
        display: grid;
        grid-template-columns: 74px 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 3px 0;
        border-bottom: 1px solid #f3f4f6;
      }

      .weather-row:last-child {
        border-bottom: none;
      }

      .weather-temp {
        white-space: nowrap;
        color: #374151;
        font-weight: 700;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%) translateY(30px);
        z-index: 1300;
        background: #111827;
        color: white;
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        font-size: 14px;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.6;
        margin-top: 6px;
      }

      .sortable-ghost {
        opacity: 0.55;
      }

      .sortable-chosen {
        border-color: #ef4444;
      }

      #importFile {
        display: none;
      }

      @media (max-width: 640px) {
        .form-grid {
          grid-template-columns: 1fr;
        }

        .drawer-header,
        .drawer-body,
        .drawer-footer {
          padding-left: 14px;
          padding-right: 14px;
        }

        .active-trip-bar {
          left: 10px;
          top: 12px;
          max-width: calc(100vw - 82px);
          font-size: 12px;
        }

        .floating-root {
          top: 12px;
          right: 12px;
        }

        .trip-card {
          grid-template-columns: 1fr;
        }

        .trip-card-actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="active-trip-bar" id="activeTripBar">
      <div>
        <div class="active-trip-title" id="activeTripTitle"></div>
        <div class="active-trip-meta" id="activeTripMeta"></div>
      </div>
    </div>

    <div class="floating-root">
      <button class="fab" id="fabBtn" title="打开菜单">+</button>
      <div class="fab-menu" id="fabMenu">
        <button class="menu-item" id="addTripBtn">添加行程</button>
        <button class="menu-item" id="selectTripBtn">选择行程</button>
        <button class="menu-item" id="editTripBtn">编辑当前行程</button>
        <button class="menu-item" id="clearRouteBtn">清除路线</button>
        <button class="menu-item" id="exportBtn">导出行程 JSON</button>
        <button class="menu-item" id="importBtn">导入行程 JSON</button>
        <input id="importFile" type="file" accept="application/json,.json" />
      </div>
    </div>

    <div class="drawer-mask" id="drawerMask"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <h2 class="drawer-title" id="drawerTitle">行程</h2>
        <button class="drawer-close" id="drawerClose" title="关闭">×</button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
      <div class="drawer-footer" id="drawerFooter"></div>
    </aside>

    <div class="toast" id="toast"></div>

      /******************************************************************
       * 2. 全局状态
       ******************************************************************/
      const STORAGE_KEY = "lightweight_trip_planner_v1";
      const WEATHER_CACHE_PREFIX = "weather_cache_";
      const WEATHER_CACHE_TTL = 6 * 60 * 60 * 1000;

      let appState = loadAppState();
      let draftTrip = null;
      let draftMode = "create";
      let cityMarkersLayer = null;
      let routeLayer = null;
      let tripMarkerLayer = null;
      let sortableInstance = null;

      /******************************************************************
       * 3. Leaflet 初始化
       ******************************************************************/
      const map = L.map("map", {
        center: [34.5, 104.0],
        zoom: 5,
        minZoom: 3,
        maxZoom: 18,
      });

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      cityMarkersLayer = L.layerGroup().addTo(map);
      routeLayer = L.layerGroup().addTo(map);
      tripMarkerLayer = L.layerGroup().addTo(map);

      initCityMarkers();
      renderActiveTrip();

      /******************************************************************
       * 4. DOM 事件绑定
       ******************************************************************/
      const fabBtn = document.getElementById("fabBtn");
      const fabMenu = document.getElementById("fabMenu");
      const drawer = document.getElementById("drawer");
      const drawerMask = document.getElementById("drawerMask");
      const drawerClose = document.getElementById("drawerClose");
      const drawerBody = document.getElementById("drawerBody");
      const drawerFooter = document.getElementById("drawerFooter");
      const drawerTitle = document.getElementById("drawerTitle");
      const importFile = document.getElementById("importFile");

      fabBtn.addEventListener("click", () => fabMenu.classList.toggle("open"));
      document.getElementById("addTripBtn").addEventListener("click", () => {
        closeFabMenu();
        openTripEditor();
      });
      document.getElementById("selectTripBtn").addEventListener("click", () => {
        closeFabMenu();
        openTripSelector();
      });
      document.getElementById("editTripBtn").addEventListener("click", () => {
        closeFabMenu();
        const trip = getActiveTrip();
        if (!trip) return showToast("请先选择一个行程");
        openTripEditor(trip.id);
      });
      document.getElementById("clearRouteBtn").addEventListener("click", () => {
        closeFabMenu();
        appState.activeTripId = null;
        saveAppState();
        renderActiveTrip();
        showToast("已清除当前路线");
      });
      document.getElementById("exportBtn").addEventListener("click", () => {
        closeFabMenu();
        exportTrips();
      });
      document.getElementById("importBtn").addEventListener("click", () => {
        closeFabMenu();
        importFile.click();
      });
      importFile.addEventListener("change", handleImportFile);

      drawerClose.addEventListener("click", closeDrawer);
      drawerMask.addEventListener("click", closeDrawer);

      /******************************************************************
       * 5. 基础工具函数
       ******************************************************************/
      function uid(prefix = "id") {
        return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }

      function escapeHtml(str = "") {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function deepClone(obj) {
        return JSON.parse(JSON.stringify(obj));
      }

      function loadAppState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return { trips: [], activeTripId: null };
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed.trips))
            return { trips: [], activeTripId: null };
          return {
            trips: parsed.trips,
            activeTripId: parsed.activeTripId || null,
          };
        } catch (error) {
          console.warn(error);
          return { trips: [], activeTripId: null };
        }
      }

      function saveAppState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
      }

      function getActiveTrip() {
        return (
          appState.trips.find((trip) => trip.id === appState.activeTripId) ||
          null
        );
      }

      function getCity(cityId) {
        return cityById.get(cityId);
      }

      function formatDateRange(start, end) {
        if (start && end) return `${start} 至 ${end}`;
        if (start) return `${start} 起`;
        if (end) return `至 ${end}`;
        return "未设置日期";
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function closeFabMenu() {
        fabMenu.classList.remove("open");
      }

      function openDrawer(title) {
        drawerTitle.textContent = title;
        drawerMask.classList.add("open");
        drawer.classList.add("open");
      }

      function closeDrawer() {
        drawerMask.classList.remove("open");
        drawer.classList.remove("open");
        drawerBody.innerHTML = "";
        drawerFooter.innerHTML = "";
        draftTrip = null;
        if (sortableInstance) {
          sortableInstance.destroy();
          sortableInstance = null;
        }
      }

      /******************************************************************
       * 6. 城市 Marker 与地图展示
       ******************************************************************/
      function initCityMarkers() {
        cityMarkersLayer.clearLayers();

        CITY_DATA.forEach((city) => {
          const icon = L.divIcon({
            className: "",
            html: `<div class="city-dot" title="${escapeHtml(city.name)}"></div>`,
            iconSize: [12, 12],
            iconAnchor: [6, 6],
          });

          const marker = L.marker([city.lat, city.lng], {
            icon,
            title: city.name,
          });
          marker.on("mouseover", () => showCityInfo(city.id));
          marker.on("mouseout", scheduleCloseCityInfo);
          marker.on("click", () => showCityInfo(city.id));
          marker.addTo(cityMarkersLayer);
        });
      }

      function renderActiveTrip() {
        renderActiveTripBar();
        renderRouteLayer();
      }

      function renderActiveTripBar() {
        const bar = document.getElementById("activeTripBar");
        const title = document.getElementById("activeTripTitle");
        const meta = document.getElementById("activeTripMeta");
        const trip = getActiveTrip();

        if (!trip) {
          bar.classList.remove("show");
          title.textContent = "";
          meta.textContent = "";
          return;
        }

        title.textContent = trip.name || "未命名行程";
        meta.textContent = `${formatDateRange(trip.startDate, trip.endDate)} · ${trip.stops.length} 个城市`;
        bar.classList.add("show");
      }

      function renderRouteLayer() {
        routeLayer.clearLayers();
        tripMarkerLayer.clearLayers();

        const trip = getActiveTrip();
        if (!trip || trip.stops.length === 0) return;

        const points = trip.stops
          .map((stop) => getCity(stop.cityId))
          .filter(Boolean)
          .map((city) => [city.lat, city.lng]);

        if (points.length >= 2) {
          L.polyline(points, {
            color: "#ef4444",
            weight: 4,
            opacity: 0.9,
            dashArray: "0",
          }).addTo(routeLayer);
        }

        trip.stops.forEach((stop, index) => {
          const city = getCity(stop.cityId);
          if (!city) return;

          const icon = L.divIcon({
            className: "",
            html: `<div class="trip-marker">${index + 1}</div>`,
            iconSize: [30, 30],
            iconAnchor: [15, 15],
          });

          const marker = L.marker([city.lat, city.lng], {
            icon,
            title: `${index + 1}. ${city.name}`,
          });
          marker.on("mouseover", () => showCityInfo(city.id));
          marker.on("mouseout", scheduleCloseCityInfo);
          marker.on("click", () => showCityInfo(city.id));
          marker.addTo(tripMarkerLayer);
        });

        if (points.length >= 1) {
          const bounds = L.latLngBounds(points);
          map.fitBounds(bounds.pad(0.25), { maxZoom: 8 });
        }
      }

      function scheduleCloseCityInfo() {
        clearTimeout(popupCloseTimer);
        popupCloseTimer = setTimeout(() => {
          map.closePopup();
        }, 180);
      }

      async function showCityInfo(cityId) {
        clearTimeout(popupCloseTimer);
        const city = getCity(cityId);
        if (!city) return;

        const trip = getActiveTrip();
        const stopInfo = findStopInfoInTrip(trip, cityId);
        const latLng = [city.lat, city.lng];

        const popup = L.popup({ maxWidth: 340, autoPan: true })
          .setLatLng(latLng)
          .setContent(renderPopupContent(city, null, stopInfo, true))
          .openOn(map);

        try {
          const weather = await getWeather(city);
          popup.setContent(renderPopupContent(city, weather, stopInfo, false));
        } catch (error) {
          console.warn(error);
          popup.setContent(
            renderPopupContent(
              city,
              null,
              stopInfo,
              false,
              "天气获取失败，可检查网络或稍后再试。",
            ),
          );
        }
      }

      function findStopInfoInTrip(trip, cityId) {
        if (!trip) return null;
        const index = trip.stops.findIndex((stop) => stop.cityId === cityId);
        if (index < 0) return null;

        const stop = trip.stops[index];
        const nextStop = trip.stops[index + 1] || null;
        const prevStop = trip.stops[index - 1] || null;
        const legToNext = nextStop
          ? trip.legs.find(
              (leg) =>
                leg.fromStopId === stop.id && leg.toStopId === nextStop.id,
            ) || null
          : null;

        return { trip, index, stop, prevStop, nextStop, legToNext };
      }

      function renderPopupContent(
        city,
        weather,
        stopInfo,
        isLoading = false,
        errorMessage = "",
      ) {
        const weatherHtml = isLoading
          ? `<div class="hint">正在获取未来七天天气...</div>`
          : errorMessage
            ? `<div class="hint">${escapeHtml(errorMessage)}</div>`
            : renderWeatherHtml(weather);

        const tripHtml = stopInfo ? renderTripInfoHtml(stopInfo) : "";

        return `
        <div class="popup-card">
          <div class="popup-title">${escapeHtml(city.name)}</div>
          <div class="popup-subtitle">${escapeHtml(city.province)} · ${escapeHtml(city.type)}</div>
          <div class="popup-block">
            <div class="popup-block-title">未来七天天气</div>
            ${weatherHtml}
          </div>
          ${tripHtml}
        </div>
      `;
      }

      function renderWeatherHtml(weather) {
        if (!weather || !Array.isArray(weather.dates)) {
          return `<div class="hint">暂无天气数据</div>`;
        }

        return weather.dates
          .map((date, index) => {
            const code = weather.codes[index];
            const min = weather.mins[index];
            const max = weather.maxs[index];
            return `
          <div class="weather-row">
            <span>${escapeHtml(date.slice(5))}</span>
            <span>${escapeHtml(weatherCodeToText(code))}</span>
            <span class="weather-temp">${Math.round(min)}°C ~ ${Math.round(max)}°C</span>
          </div>
        `;
          })
          .join("");
      }

      function renderTripInfoHtml(stopInfo) {
        const { trip, index, stop, nextStop, legToNext } = stopInfo;
        const city = getCity(stop.cityId);
        const nextCity = nextStop ? getCity(nextStop.cityId) : null;

        const hotelHtml = `
        <div><strong>停留：</strong>${escapeHtml(formatDateRange(stop.arrivalDate, stop.departureDate))}</div>
        <div><strong>酒店：</strong>${escapeHtml(stop.hotelName || "未填写")}</div>
        <div><strong>位置：</strong>${escapeHtml(stop.hotelAddress || "未填写")}</div>
        ${stop.notes ? `<div><strong>备注：</strong>${escapeHtml(stop.notes)}</div>` : ""}
      `;

        let legHtml = "";
        if (!nextStop || !nextCity) {
          legHtml = `<div class="hint">当前城市为行程终点。</div>`;
        } else if (!legToNext) {
          legHtml = `<div class="hint">下一站：${escapeHtml(nextCity.name)}。尚未填写交通信息。</div>`;
        } else {
          const transportName = legToNext.type || "交通";
          legHtml = `
          <div><strong>下一站：</strong>${escapeHtml(nextCity.name)}</div>
          <div><strong>交通：</strong>${escapeHtml(transportName)} ${escapeHtml(legToNext.trainNo || "")}</div>
          <div><strong>出发：</strong>${escapeHtml(legToNext.departureTime || "未填写")} · ${escapeHtml(legToNext.departureStation || "未填写出发站")}</div>

        `;

      /******************************************************************
       * 7. 天气：Open-Meteo 轻量方案
       ******************************************************************/
      async function getWeather(city) {
        const cacheKey = WEATHER_CACHE_PREFIX + city.id;
        const cached = readWeatherCache(cacheKey);
        if (cached) return cached;

        const url = new URL("https://api.open-meteo.com/v1/forecast");
        url.searchParams.set("latitude", city.lat);
        url.searchParams.set("longitude", city.lng);
        url.searchParams.set(
          "daily",
          "weather_code,temperature_2m_max,temperature_2m_min",
        );
        url.searchParams.set("timezone", "Asia/Shanghai");
        url.searchParams.set("forecast_days", "7");

        const res = await fetch(url.toString());
        if (!res.ok) throw new Error("天气接口请求失败");
        const data = await res.json();

        const normalized = {
          dates: data.daily.time || [],
          codes: data.daily.weather_code || [],
          maxs: data.daily.temperature_2m_max || [],
          mins: data.daily.temperature_2m_min || [],
          provider: "Open-Meteo",
        };

        writeWeatherCache(cacheKey, normalized);
        return normalized;
      }

      function readWeatherCache(cacheKey) {
        try {
          const raw = localStorage.getItem(cacheKey);
          if (!raw) return null;
          const payload = JSON.parse(raw);
          if (!payload.ts || Date.now() - payload.ts > WEATHER_CACHE_TTL)
            return null;
          return payload.data;
        } catch (error) {
          return null;
        }
      }

      function writeWeatherCache(cacheKey, data) {
        localStorage.setItem(
          cacheKey,
          JSON.stringify({ ts: Date.now(), data }),
        );
      }

          if (selectedCityIds.has(city.id)) return false;
          if (!normalized)
            return ["热门", "省会", "首府", "直辖市", "特别行政区"].some(
              (tag) => city.type.includes(tag),
            );
          return (
            city.name.includes(keyword.trim()) ||
            city.pinyin.toLowerCase().includes(normalized) ||
            city.initial.toLowerCase().includes(normalized) ||
            city.province.includes(keyword.trim()) ||
            city.type.includes(keyword.trim())

      function renderTransportOptions(currentType = "高铁") {
        const options = [
          "高铁",
          "动车",
          "火车",
          "飞机",
          "自驾",
          "打车",
          "轮渡",
          "大巴",
          "其他",
        ];
        return options
          .map(
            (option) =>
              `<option value="${option}" ${option === currentType ? "selected" : ""}>${option}</option>`,
          )
          .join("");
      }

      function updateDraftLegField(target) {
        const leg = draftTrip.legs.find(
          (item) => item.id === target.dataset.legId,
        );
        if (!leg) return;
        leg[target.dataset.legField] = target.value;
      }

      function reconcileDraftLegs() {
        const oldLegs = draftTrip.legs || [];
        const newLegs = [];

        for (let i = 0; i < draftTrip.stops.length - 1; i++) {
          const fromStop = draftTrip.stops[i];
          const toStop = draftTrip.stops[i + 1];
          const old = oldLegs.find(
            (leg) =>
              leg.fromStopId === fromStop.id && leg.toStopId === toStop.id,
          );

          newLegs.push(
            old || {
              id: uid("leg"),
              fromStopId: fromStop.id,
              toStopId: toStop.id,
              type: "高铁",
              trainNo: "",
              departureStation: "",
              arrivalStation: "",
              departureTime: "",
              arrivalTime: "",
              notes: "",
            },
          );
        }

        draftTrip.legs = newLegs;
      }

      function saveDraftTrip() {
        if (!draftTrip.name.trim()) {
          showToast("请填写行程名称");
          return;
        }

        if (draftTrip.stops.length === 0) {
          showToast("请至少添加一个城市");
          return;
        }

        reconcileDraftLegs();

        const cleanTrip = deepClone(draftTrip);
        cleanTrip.name = cleanTrip.name.trim();

        const index = appState.trips.findIndex(
          (trip) => trip.id === cleanTrip.id,
        );
        if (index >= 0) {
          appState.trips[index] = cleanTrip;
        } else {
          appState.trips.push(cleanTrip);
        }

        appState.activeTripId = cleanTrip.id;
        saveAppState();
        renderActiveTrip();
        closeDrawer();
        showToast(draftMode === "edit" ? "行程已更新" : "行程已保存");
      }

      function exportTrips() {
        const payload = JSON.stringify(appState, null, 2);
        const blob = new Blob([payload], {
          type: "application/json;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `trip-planner-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast("已导出 JSON");
      }

      function handleImportFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (!parsed || !Array.isArray(parsed.trips))
              throw new Error("格式错误");

            const ok = confirm("导入会覆盖当前本地行程数据，确定继续吗？");
            if (!ok) return;

            appState = {
              trips: parsed.trips,
              activeTripId: parsed.activeTripId || null,
            };
            saveAppState();
            renderActiveTrip();
            showToast("导入成功");
          } catch (error) {
            console.warn(error);
            showToast("导入失败：JSON 格式不正确");
          } finally {
            e.target.value = "";
          }
        };
        reader.readAsText(file, "utf-8");
      }
    </script>
  </body>
</html>
